<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — CivicFix</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<div class="navbar">
  <div class="brand">Civic<span>Fix</span> <span style="font-size:12px; opacity:0.7;">ADMIN</span></div>
  <nav>
    <a href="admin.html">Dashboard</a>
    <a href="#" onclick="logout(); return false;">Log out</a>
  </nav>
</div>

<div class="container">
  <h2 style="margin-top:0;">All Complaints</h2>
  <p id="adminIdentity" style="color:var(--text-muted); font-size:13px; margin-top:-8px;"></p>

  <div class="stats-row" id="statsRow"></div>

  <div class="card" style="padding:0; overflow:hidden;">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; padding:16px 16px 0;">
      <h3 style="margin:0;">Complaint Locations</h3>
      <div style="display:flex; gap:14px; font-size:12px; color:var(--text-muted); align-items:center; flex-wrap:wrap;">
        <span><span class="map-dot" style="background:#e63946;"></span>Selected</span>
        <span><span class="map-dot" style="background:#d68c2c;"></span>Nearby (within 2 km)</span>
        <span><span class="map-dot" style="background:#2c5aa0;"></span>Other complaints</span>
      </div>
    </div>
    <div id="adminMap"></div>
    <p id="mapHint" style="padding:10px 16px; margin:0; font-size:12px; color:var(--text-muted); border-top:1px solid var(--border);">
      Click any marker, or hit "View on map" in the table below, to select a complaint and see the nearest open issues around it.
    </p>
    <div id="nearbyPanel" style="padding:12px 16px; border-top:1px solid var(--border); display:none;"></div>
  </div>

  <div class="filters">
    <select id="statusFilter" onchange="loadComplaints()">
      <option value="">All statuses</option>
      <option value="pending">Pending</option>
      <option value="in_progress">In Progress</option>
      <option value="resolved">Resolved</option>
    </select>
    <select id="categoryFilter" onchange="loadComplaints()">
      <option value="">All categories</option>
      <option value="Roads">Roads</option>
      <option value="Sanitation">Sanitation</option>
      <option value="Electricity">Electricity</option>
      <option value="Water">Water</option>
      <option value="Other">Other</option>
    </select>
  </div>

  <div id="complaintsTable"></div>
</div>

<footer>CivicFix — a civic-tech demo project</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
